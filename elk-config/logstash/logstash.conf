input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["apm"]
    codec => "json"
    client_id => "logstash-apm-consumer"
    group_id => "logstash-apm-group"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "admin123"
    index => "apm-7.14.0-%{[processor][event]}-%{+YYYY.MM.dd}"
  }
}
