input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["apm"]
    codec => "json"
    client_id => "logstash-apm-consumer"
    group_id => "logstash-apm-group"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "admin123"

    # --- 路線 2：ILM 自動資源回收設定 ---
    ilm_enabled => true
    ilm_policy => "apm-retention-policy"
    ilm_rollover_alias => "apm"
  }
}
