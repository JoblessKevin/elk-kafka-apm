input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["otel-logs"]
    codec => "json"
    client_id => "logstash-logs-consumer"
    group_id => "logstash-logs-group"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "logstash_internal"
    password => "${LOGSTASH_INTERNAL_PASSWORD}"

    # --- Output to standard ECS data stream to fix Kibana Observability UI ---
    data_stream => "true"
    data_stream_type => "logs" 
    data_stream_dataset => "generic"   
    data_stream_namespace => "default"
  }
}
